version: 0.2

phases:
  install:
    commands:
      - echo "Install phase"

  build:
    commands:
      - echo "Build phase"
      - mkdir -p output
      - cp portal.html index.html
      - cp index.html output/

      # CodeDeploy 파일 포함
      - mkdir -p scripts
      - cp restart.sh scripts/
      
  post_build:
    commands:
      - echo "Post build phase"

artifacts:
  files:
    - appspec.yml
    - output/**/*
    - scripts/**/*
